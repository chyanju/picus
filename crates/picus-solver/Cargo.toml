[package]
name = "picus-solver"
version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
edition.workspace = true
description = "Pure Rust finite field SMT solver for Picus"

[dependencies]
num-bigint.workspace = true
num-traits.workspace = true
num-integer.workspace = true
log.workspace = true
thiserror.workspace = true
feanor-math = { git = "https://github.com/chyanju/feanor-math", rev = "a3c08f7f4a47c51fc27a683752c28ba44c1091b4", features = ["unstable-enable"] }
oorandom = "11.1"

[dev-dependencies]
env_logger = "0.11"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "solver_bench"
harness = false
